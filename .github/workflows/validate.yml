name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        continue-on-error: true

  json:
    name: JSON Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON syntax
        run: |
          set -e
          find . -name "*.json" -not -path "./.git/*" -print0 \
            | xargs -0 -I{} sh -c 'echo "Checking {}"; python -c "import json; json.load(open(\"{}\", encoding=\"utf-8\"))"'

  skill-schema:
    name: Skill Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SKILL.md frontmatter
        run: |
          set -e
          ok=1
          for f in $(find skills -name SKILL.md -not -path "*/.git/*" 2>/dev/null); do
            head -1 "$f" | grep -q '^---$' || { echo "Missing frontmatter: $f"; ok=0; }
          done
          [ "$ok" = 1 ]
